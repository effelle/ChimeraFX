# Dummy config to test compilation of the cfx_light SPI refactor
esphome:
  name: spi-test
  platform: ESP32
  board: esp32dev

logger:

cfx_effect:

light:
  # RMT Control (should remain unchanged)
  - platform: cfx_light
    id: rmt_strip
    name: "RMT Strip"
    pin: GPIO13
    num_leds: 50
    chipset: WS2812X
    
  # New SPI Control
  - platform: cfx_light
    id: spi_strip
    name: "SPI Strip"
    data_pin: GPIO23
    clock_pin: GPIO18
    num_leds: 144
    chipset: SK9822
    spi_speed: 10MHz
