packages:
  common: !include effect-common.yaml

esphome:
  name: cfx-sync-leader-effect-arduino
  min_version: 2026.5.1

esp32:
  board: esp32dev
  framework:
    type: arduino

light:
  - platform: cfx_light
    id: sync_effect_leader
    name: "Sync Effect Leader"
    pin: GPIO16
    num_leds: 8
    chipset: WS2812X
    all_effects: false
    controls: false
    effects:
      - addressable_cfx:
          effect_id: 3
      - addressable_cfx:
          name: "Slow Red Wipe"
          effect_id: 3
          set_speed: 32
          set_color: [100, 0, 0]
      - addressable_lambda:
          name: "Unsupported Leader Diagnostic"
          update_interval: 50ms
          lambda: |-
            it.all() = Color::BLACK;

cfx_sync:
  id: effect_sync
  espnow_id: espnow_bus
  role: leader
  lights:
    - sync_effect_leader
  peer: "02:00:00:00:00:02"
  group: effect_room
  key: "effect-room-2026"
  heartbeat: 30s
