packages:
  common: !include effect-common.yaml

esphome:
  name: cfx-sync-follower-effect-idf
  min_version: 2026.5.1

esp32:
  board: esp32dev
  framework:
    type: esp-idf

cfx_sync:
  id: effect_sync
  espnow_id: espnow_bus
  role: follower
  lights:
    - sync_effect_segment_a
    - sync_effect_segment_b
  peer: "02:00:00:00:00:02"
  group: effect_room
  key: "effect-room-2026"
  heartbeat: 30s
